# Automatski deploy na produkciju pri push-u na main
# Zahteva GitHub Secrets: DEPLOY_SSH_PRIVATE_KEY, SERVER_HOST, SERVER_USER

name: Deploy to production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "SSH command: ssh -i ~/.ssh/deploy_key ${SERVER_USER}@${SERVER_HOST}"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "${SERVER_USER}@${SERVER_HOST}" '
            set -e
            COMPOSE="docker compose -p opt -f /opt/docker-compose.prod.yml --env-file /opt/.env"
            echo "→ Pull programai-crm..."
            cd /opt/programai-crm && git pull origin main
            echo "→ Pull programai-frontend..."
            cd /opt/programai-frontend && git pull origin main
            echo "→ Cleanup stale containers..."
            docker rm -f programai_backend programai_frontend programai_postgres programai_redis 2>/dev/null || true
            docker ps -aq --filter "name=_programai_backend$" | xargs -r docker rm -f || true
            docker ps -aq --filter "name=_programai_frontend$" | xargs -r docker rm -f || true
            docker ps -aq --filter "name=_programai_postgres$" | xargs -r docker rm -f || true
            docker ps -aq --filter "name=_programai_redis$" | xargs -r docker rm -f || true
            echo "→ Build and restart containers..."
            $COMPOSE down --remove-orphans || true
            $COMPOSE build --no-cache
            $COMPOSE up -d --remove-orphans
            echo "→ Prisma migrate deploy..."
            docker exec programai_backend npx prisma migrate deploy || true
            echo "→ Done."
            $COMPOSE ps
          '